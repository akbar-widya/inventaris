<!DOCTYPE html>
<html lang="id">
<head>
    <title>Login Staf - Sistem Inventaris</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Agar input yang dihasilkan Django otomatis jadi block */
        .form-group p { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: .25rem; }
        .form-group input { 
            display: block; 
            width: 100%; 
            padding: .375rem .75rem; 
            border: 1px solid #dee2e6; 
            border-radius: .375rem; 
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="m-0">Login Inventaris</h4>
                    </div>
                    <div class="card-body p-4">
                        {% if form.errors %}
                            <div class="alert alert-danger p-2 mb-3">Username atau password salah.</div>
                        {% endif %}
                        
                        <form method="post" class="form-group">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100 mt-3">Masuk Sistem</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
