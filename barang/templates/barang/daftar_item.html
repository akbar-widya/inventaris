<!DOCTYPE html>
<html lang="id">
<head>
    <title>Sistem Inventaris</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sistem Inventaris</span>
            <div class="d-flex align-items-center">
                <span class="text-light me-3">User: <strong>{{ user.username }}</strong></span>
                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-danger">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Sidebar Form -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">Tambah Barang</div>
                    <div class="card-body">
                        <form hx-post="{% url 'tambah_item' %}" hx-target="#tabel-body" hx-on::after-request="this.reset()">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100">Simpan Barang</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Tabel Konten -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="m-0">Daftar Barang</h5>
                        <input type="text" name="q" class="form-control form-control-sm w-50" placeholder="Cari nama barang..." hx-get="/" hx-trigger="keyup changed delay:500ms" hx-target="#tabel-body">
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-striped m-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Nama</th>
                                    <th>Kategori</th>
                                    <th>Stok</th>
                                    <th>Harga</th>
                                    <th width="150">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-body">
                                {% include 'barang/partial_item.html' %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
